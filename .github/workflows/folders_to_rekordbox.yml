name: Build Folders to Rekordbox

on:
  workflow_dispatch:
  push:
    tags:
      - "folders-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Pioneer_Sync
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build
        working-directory: Pioneer_Sync
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed ^
            --name "Folders to Rekordbox" ^
            --icon rekordbox.ico ^
            --add-data "rekordbox.ico;." ^
            --add-data "rekordbox.webp;." ^
            folders_to_rekordbox_app.py

      - name: Zip artifact
        shell: pwsh
        run: |
          if (!(Test-Path "Pioneer_Sync/dist/Folders to Rekordbox.exe")) { throw "Windows build did not produce the expected EXE." }
          Compress-Archive -Path "Pioneer_Sync/dist/Folders to Rekordbox.exe" -DestinationPath "Pioneer_Sync/dist/Folders-to-Rekordbox-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folders-to-Rekordbox-windows
          path: Pioneer_Sync/dist/Folders-to-Rekordbox-windows.zip

  build-macos:
    name: macOS universal2 .app
    runs-on: macos-14
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Pioneer_Sync
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Build
        working-directory: Pioneer_Sync
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "Folders to Rekordbox" \
            --target-architecture universal2 \
            --osx-bundle-identifier com.oficialdjcacho.folderstorekordbox \
            --add-data "rekordbox.webp:." \
            folders_to_rekordbox_app.py

      - name: Zip artifact
        run: |
          test -d "Pioneer_Sync/dist/Folders to Rekordbox.app"
          cd Pioneer_Sync/dist
          zip -r Folders-to-Rekordbox-macos-universal2.zip "Folders to Rekordbox.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folders-to-Rekordbox-macos-universal2
          path: Pioneer_Sync/dist/Folders-to-Rekordbox-macos-universal2.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Folders-to-Rekordbox-windows
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Folders-to-Rekordbox-macos-universal2
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/Folders-to-Rekordbox-windows.zip
            release-assets/Folders-to-Rekordbox-macos-universal2.zip
