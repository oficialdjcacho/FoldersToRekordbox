name: Build Folders to Rekordbox

on:
  workflow_dispatch:
  push:
    tags:
      - "folders-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Pioneer_Sync
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build
        working-directory: Pioneer_Sync
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed ^
            --name "Folders to Rekordbox" ^
            --icon rekordbox.ico ^
            --add-data "rekordbox.ico;." ^
            --add-data "rekordbox.webp;." ^
            folders_to_rekordbox_app.py

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "Pioneer_Sync/dist/Folders to Rekordbox.exe" -DestinationPath "Pioneer_Sync/dist/Folders-to-Rekordbox-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folders-to-Rekordbox-windows
          path: Pioneer_Sync/dist/Folders-to-Rekordbox-windows.zip

  publish-release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Folders-to-Rekordbox-windows
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/Folders-to-Rekordbox-windows.zip
